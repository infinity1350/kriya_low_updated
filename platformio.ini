; PlatformIO Project Configuration File
;
; STM32 Battery Management System — Phase 2
; TFT_eSPI + DMA + NeoPixel + ROS
;
; ============================================================================
; Common settings
; ============================================================================
[common]
framework = arduino
monitor_speed = 115200

; --- Core build flags ---
build_flags =
    ; USB CDC serial
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON
    -D USB_MANUFACTURER="STM32"
    -D USB_PRODUCT="\"STM32 BMS Controller\""
    -D HAL_PCD_MODULE_ENABLED
    -D USBD_USE_CDC
    -Iinclude

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit NeoPixel@^1.12.0
    frankjoshua/Rosserial Arduino Library@^0.9.1

; ============================================================================
; STM32F407VET6  (168 MHz, 512 KB Flash, 192 KB RAM)
;   SPI1 on APB2 @ 84 MHz  →  max SPI clk = 42 MHz
; ============================================================================
[env:genericSTM32F407VET6]
platform = ststm32
board = genericSTM32F407VET6
framework = ${common.framework}
upload_protocol = stlink
; debug_tool = stlink

build_flags =
    ${common.build_flags}
    ; F407-specific: can push SPI1 to 42 MHz safely
    ; -D SPI_FREQUENCY=42000000   ; uncomment to squeeze extra speed

monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}

; ============================================================================
; BlackPill F411CE  (100 MHz, 512 KB Flash, 128 KB RAM)
;   SPI1 on APB2 @ 100 MHz  →  max SPI clk = 50 MHz
; ============================================================================
[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = ${common.framework}
upload_protocol = stlink
; debug_tool = stlink

build_flags =
    ${common.build_flags}
    ; F411 APB2 is faster — 50 MHz SPI1 is achievable
    ; -D SPI_FREQUENCY=50000000   ; uncomment after verifying stability
    -Wl,-u,_printf_float

monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}